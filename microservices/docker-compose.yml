services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
      - "9093:9093"
    volumes:
      - kafka_data:/apache/kafka/data

  ledger-service-db:
    image: postgres:15
    container_name: ledger-service-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LEDGER_SERVICE_POSTGRES_DB}
      POSTGRES_USER: ${LEDGER_SERVICE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LEDGER_SERVICE_POSTGRES_PASSWORD}
    ports:
      - "5001:5432"
    volumes:
      - ./ledger_service/db_scripts:/docker-entrypoint-initdb.d
      - ledger_data:/var/lib/postgresql/data

  ledger-service-app:
    build:
      context: ./ledger_service
      dockerfile: dockerfile
    image: ledger-service-app/clojure:latest
    container_name: ledger-service-app
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_HOST=ledger-service-db
      - DB_PORT=5432
      - DB_NAME=${LEDGER_SERVICE_POSTGRES_DB}
      - DB_USER=${LEDGER_SERVICE_POSTGRES_USER}
      - DB_PASSWORD=${LEDGER_SERVICE_POSTGRES_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - ledger-service-db
      - kafka

  exchange-service-db:
    image: postgres:15
    container_name: exchange-service-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EXCHANGE_SERVICE_POSTGRES_DB}
      POSTGRES_USER: ${EXCHANGE_SERVICE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${EXCHANGE_SERVICE_POSTGRES_PASSWORD}
    ports:
      - "5002:5432"
    volumes:
      - ./exchange_service/db_scripts:/docker-entrypoint-initdb.d
      - exchange_data:/var/lib/postgresql/data

  exchange-service-app:
    build:
      context: ./exchange_service
      dockerfile: dockerfile
    image: exchange-service-app/clojure:latest
    container_name: exchange-service-app
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DB_HOST=exchange-service-db
      - DB_PORT=5432
      - DB_NAME=${EXCHANGE_SERVICE_POSTGRES_DB}
      - DB_USER=${EXCHANGE_SERVICE_POSTGRES_USER}
      - DB_PASSWORD=${EXCHANGE_SERVICE_POSTGRES_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - exchange-service-db
      - kafka

  reverse-proxy:
    build:
      context: ./reverse_proxy
      dockerfile: dockerfile
    image: nginx:latest
    container_name: reverse-proxy
    ports:
      - "8080:8080"
    volumes:
      - ./reverse_proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ledger-service-app
      - exchange-service-app

volumes:
  kafka_data:
  ledger_data:
  exchange_data:
